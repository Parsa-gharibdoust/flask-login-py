<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
</head>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        min-height: 100vh;
        background: #0a0a0a;
        color: rgba(255, 255, 255, 0.9);
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        padding: 18px;
    }

    main {
        width: min(560px, 100%);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 8px;
        background: rgba(22, 22, 22, 0.92);
        padding: 34px;
        text-align: center;
        box-shadow: 0 25px 60px rgba(0, 0, 0, 0.45);
    }

    h1 {
        font-size: 26px;
        line-height: 1.7;
        font-weight: 700;
        margin-bottom: 14px;
    }

    p {
        color: rgba(255, 255, 255, 0.62);
        line-height: 1.9;
        margin-bottom: 28px;
    }

    button {
        min-width: 120px;
        height: 42px;
        border: 0;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.9);
        color: #0a0a0a;
        font-weight: 700;
        cursor: pointer;
    }

    button:disabled {
        cursor: wait;
        opacity: 0.65;
    }
</style>

<body>
    <main>
        <h1>CONGRATS. SECURE LOGIN DONE.</h1>
        <p>SESSION IS VALID.</p>
        <button id="logout-btn" type="button">LOGOUT</button>
    </main>

    <script src="/assets/dashboard.js"></script>
</body>
</html>
